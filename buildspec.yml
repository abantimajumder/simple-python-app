version: 0.2

env:
  variables: {}   # 👈 REQUIRED (even if empty)

  parameter-store:
    DOCKER_REGISTRY_USERNAME: "/docker-credentials/username"
    DOCKER_REGISTRY_PASSWORD: "/docker-credentials/access-token"
    DOCKER_REGISTRY_URL: "/docker-credentials/docker-registry-url"
    
phases:
 install:
   runtime-versions:
     python : 3.11
 pre_build:
   commands:
    - pip install -r simple-python-app/requirements.txt
     
   build:
    commands:
      - cd simple-python-app
      - echo "Building docker image"
      - docker build -t "$DOCKER_REGISTRY_URL/DOCKER_REGISTRY_USERNAME/simple-python-app:latest"
      - docker push "$DOCKER_REGISTRY_URL/DOCKER_REGISTRY_USERNAME/simple-python-app:latest"
    post_build:
      commands:
        - echo "Build is successful"
